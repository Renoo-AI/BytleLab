<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLearn | Vulnerabilities 2.0</title>
    <link rel="icon" type="image/png" href="https://dropshare.42web.io/1/files/UIi3dXms4F.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #051a0a;
            color: white;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glow-text {
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://dropshare.42web.io/1/files/zVYAUZDpex.png" class="w-32 mx-auto mb-8" alt="Byte">
        <h1 class="text-4xl font-black mb-6 uppercase tracking-tighter glow-text">World 2: Vulnerabilities</h1>
        <p class="text-white/60 mb-10 leading-relaxed text-lg italic">"Every system has a crack. Finding it isn't the challenge; understanding how to pry it open is. Welcome to the audit."</p>
        <div class="p-6 bg-white/5 border border-white/10 rounded-2xl mb-12 text-left">
            <p class="text-[10px] font-black uppercase tracking-widest text-white/40 mb-4">Diagnostic Report</p>
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                    <span class="text-sm">Logic flaw detected in auth.subsystem</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-2 h-2 bg-yellow-500 rounded-full"></span>
                    <span class="text-sm">Unsanitized input in /search query</span>
                </div>
            </div>
        </div>
        <p class="text-xs text-white/20 animate-pulse uppercase tracking-[0.4em]">Exploitation Engine Pre-warmed</p>
    </div>
</body>
</html>
