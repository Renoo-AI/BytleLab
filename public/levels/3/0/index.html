<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLearn | Exploitation 3.0</title>
    <link rel="icon" type="image/png" href="https://dropshare.42web.io/1/files/UIi3dXms4F.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a0505;
            color: white;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(244, 63, 94, 0.2);
            border-radius: 32px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .glow-text {
            color: #f43f5e;
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://dropshare.42web.io/1/files/zVYAUZDpex.png" class="w-32 mx-auto mb-8" alt="Byte">
        <h1 class="text-4xl font-black mb-6 uppercase tracking-tighter glow-text">World 3: Exploitation</h1>
        <p class="text-white/60 mb-10 leading-relaxed text-lg italic">"The crack is found. Now, you must turn it into a door. This is where the theory ends and the impact begins."</p>
        <div class="grid grid-cols-2 gap-4 mb-12">
            <div class="p-4 bg-white/5 border border-white/5 rounded-2xl">
                <p class="text-[9px] font-black uppercase text-white/30 tracking-widest">Payload Payload</p>
                <p class="text-sm font-bold mt-1">Primed</p>
            </div>
            <div class="p-4 bg-white/5 border border-white/5 rounded-2xl">
                <p class="text-[9px] font-black uppercase text-white/30 tracking-widest">Target Shell</p>
                <p class="text-sm font-bold mt-1 text-red-500 animate-pulse">Disconnected</p>
            </div>
        </div>
        <p class="text-xs text-white/10 animate-pulse uppercase tracking-[0.4em]">Weaponizing Flaws...</p>
    </div>
</body>
</html>
