<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLearn | Discovery 0.4</title>
    <link rel="icon" type="image/png" href="https://dropshare.42web.io/1/files/UIi3dXms4F.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f6fb;
            --text: #1d1d1f;
            --primary: #4546d7;
            --secondary: #86868b;
            --border: #e2e8f0;
            --font-main: 'Be Vietnam Pro', sans-serif;
            --font-display: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* --- TOP BAR --- */
        #header-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(245, 246, 251, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo-group { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .app-logo { width: 32px; height: 32px; object-fit: contain; }

        .progress-box {
            display: flex; align-items: center; gap: 12px;
            flex-grow: 1; max-width: 300px; margin: 0 40px;
        }

        .progress-rail {
            flex-grow: 1; height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: var(--primary); width: 80%; 
            transition: width 1s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .progress-text { font-size: 0.85rem; font-weight: 800; color: var(--secondary); min-width: 30px; }

        .btn-quit { color: var(--secondary); font-weight: 700; font-size: 1rem; transition: color 0.2s; cursor: pointer; border: none; background: none; }
        .btn-quit:hover { color: #f43f5e; }

        /* --- APP CONTENT --- */
        #app-shell {
            flex-grow: 1;
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .top-banner {
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .main-workspace {
            flex-grow: 1;
            padding: 60px;
            overflow-y: auto;
            position: relative;
        }

        /* --- CARDS & PANELS --- */
        .account-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: white;
            padding: 32px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            border: 1px solid var(--border);
            transition: all 0.4s ease;
        }

        .admin-panel {
            position: fixed;
            top: 160px;
            right: 0;
            width: 350px;
            bottom: 0;
            background: white;
            border-left: 1px solid var(--border);
            padding: 40px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .admin-active .admin-panel { transform: translateX(0); }

        /* --- ASSISTANT HUD --- */
        .assistant-container {
            position: fixed; bottom: 40px; right: 40px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 12px; z-index: 1000; max-width: 320px; opacity: 0;
            transform: translateY(10px);
            transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .assistant-container.victory-move {
            bottom: 50% !important; right: 50% !important;
            transform: translate(50%, 50%) scale(1.1) !important;
            align-items: center; max-width: 440px;
        }

        .bubble {
            background: white; padding: 20px 24px; border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); text-align: right;
            position: relative; opacity: 0; transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .bubble.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        .assistant-container.victory-move .bubble { text-align: center; padding: 32px; }
        .bubble::after {
            content: ''; position: absolute; bottom: -8px; right: 24px;
            border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid white;
        }
        .assistant-container.victory-move .bubble::after { left: 50%; right: auto; transform: translateX(-50%); }

        .bubble-text { font-size: 1.1rem; font-weight: 600; line-height: 1.5; color: #334155; }

        .mascot-img {
            width: 80px; height: 80px; object-fit: contain;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .assistant-container.victory-move .mascot-img { width: 150px; height: 150px; }

        /* --- OVERLAYS --- */
        #transition-screen { position: fixed; inset: 0; background: var(--primary); z-index: 4000; opacity: 1; pointer-events: none; transition: opacity 0.6s ease; }
        #story-overlay { position: fixed; inset: 0; background: white; z-index: 1500; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        #system-msg { position: fixed; bottom: 40px; font-size: 13px; color: var(--secondary); font-weight: 500; opacity: 0; transition: opacity 0.5s; z-index: 3000; }
    </style>
</head>
<body>

    <div id="transition-screen"></div>

    <!-- Intro Story -->
    <div id="story-overlay">
        <div class="text-center max-w-lg p-8">
            <img src="https://dropshare.42web.io/1/files/zVYAUZDpex.png" class="w-24 mx-auto mb-8" alt="Byte">
            <h1 class="text-3xl font-extrabold mb-4 tracking-tight">Who you are is data.</h1>
            <p class="text-lg text-slate-500 mb-10 font-medium leading-relaxed">Identity is usually a lock. Here, it is just an attribute that you can rewrite.</p>
            <button onclick="startLevel()" class="bg-[#4546d7] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">Enter System</button>
        </div>
    </div>

    <!-- Header Navigation -->
    <header id="header-nav" class="opacity-0 transition-opacity duration-700">
        <div class="logo-group">
            <img src="https://dropshare.42web.io/1/files/UIi3dXms4F.png" class="app-logo" alt="ByteLearn Logo">
            <span class="font-extrabold text-2xl tracking-tighter">ByteLearn</span>
        </div>

        <div class="progress-box">
            <div class="progress-rail">
                <div id="progress-fill-bar" class="progress-fill"></div>
            </div>
            <span id="progress-text-val" class="progress-text">4/5</span>
        </div>

        <button onclick="quit()" class="btn-quit bg-none border-none">Quit</button>
    </header>

    <!-- THE CHALLENGE: Inspect this element and change data-role to 'admin' -->
    <div id="app-shell" data-role="guest">
        <div class="top-banner">
            <span class="font-bold text-slate-300 uppercase tracking-widest text-xs">National Bank Dashboard</span>
            <span id="welcome-msg" class="font-medium">Welcome, Guest</span>
        </div>

        <main class="main-workspace">
            <div id="view-content" class="w-full max-w-6xl mx-auto">
                <!-- JS Renders Content Here -->
            </div>
        </main>

        <aside class="admin-panel" id="admin-sidebar">
            <h3 class="font-black text-xl mb-6">System Control</h3>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Access Logs</p>
                    <p class="text-xs font-mono mt-2">Privilege escalation detected...</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Root Authority</p>
                    <p class="text-xs font-mono mt-2">Active: Administrator</p>
                </div>
                <button class="w-full bg-primary text-white py-4 rounded-xl font-bold mt-8">Bypass Global Firewall</button>
            </div>
        </aside>
    </div>

    <div id="assistant" class="assistant-container">
        <div id="bubble-node" class="bubble">
            <p class="bubble-text" id="talk-text"></p>
        </div>
        <img id="mascot" src="https://dropshare.42web.io/1/files/n3cWyiNBjO.png" class="mascot-img" alt="Byte">
    </div>

    <p id="system-msg">Identity, here, is just an attribute.</p>

    <script>
        const transition = document.getElementById('transition-screen');
        const story = document.getElementById('story-overlay');
        const header = document.getElementById('header-nav');
        const assistant = document.getElementById('assistant');
        const bubble = document.getElementById('bubble-node');
        const appShell = document.getElementById('app-shell');
        const viewContent = document.getElementById('view-content');
        const welcomeMsg = document.getElementById('welcome-msg');
        const talkText = document.getElementById('talk-text');
        const sysMsg = document.getElementById('system-msg');
        const fillBar = document.getElementById('progress-fill-bar');

        const MASCOT = {
            thinking: "https://dropshare.42web.io/1/files/n3cWyiNBjO.png",
            pc: "https://dropshare.42web.io/1/files/OStYxaWILh.png"
        };

        let talkTimeout, hintTimeout, hasWon = false;

        function speak(text, persist = false) {
            if (hasWon && !persist) return;
            clearTimeout(talkTimeout);
            talkText.innerText = text;
            bubble.classList.add('visible');
            if (!persist) talkTimeout = setTimeout(() => bubble.classList.remove('visible'), 6000);
        }

        window.onload = () => {
            setTimeout(() => transition.style.opacity = '0', 500);
            renderContent();
        };

        function startLevel() {
            story.style.opacity = '0';
            setTimeout(() => {
                story.style.display = 'none';
                transition.style.opacity = '1';
                setTimeout(() => {
                    transition.style.opacity = '0';
                    header.style.opacity = '1';
                    appShell.style.opacity = '1';
                    appShell.style.transform = 'translateY(0)';
                    assistant.style.opacity = '1';
                    assistant.style.transform = 'translateY(0)';
                    
                    speak("Take a look.");
                    initRoleObserver();
                    
                    hintTimeout = setTimeout(() => {
                        if (!hasWon) speak("Hint: The word 'Guest' implies there are other roles. Look at the root of the app shell in the code.");
                    }, 25000);
                }, 800);
            }, 500);
        }

        function renderContent() {
            const role = appShell.dataset.role;
            let html = "";
            
            if (role === 'admin') {
                welcomeMsg.innerText = "Welcome, Administrator";
                html = `
                    <h2 class="text-3xl font-black mb-8">Master Ledger</h2>
                    <div class="account-grid">
                        <div class="card bg-primary text-white border-none">
                            <p class="text-[10px] font-black uppercase opacity-60">System Liquid Assets</p>
                            <p class="text-4xl font-black mt-2">$8.4 Billion</p>
                        </div>
                        <div class="card border-primary border-2">
                            <p class="text-[10px] font-black text-primary uppercase">Active Sessions</p>
                            <p class="text-4xl font-black mt-2">14,201</p>
                        </div>
                        <div class="card">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Encryption Status</p>
                            <p class="text-4xl font-black mt-2">AES-256</p>
                        </div>
                    </div>
                `;
                appShell.classList.add('admin-active');
            } else if (role === 'user') {
                welcomeMsg.innerText = "Welcome, Premium User";
                html = `
                    <h2 class="text-2xl font-black mb-6">Your Personal Accounts</h2>
                    <div class="account-grid">
                        <div class="card">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Savings Account</p>
                            <p class="text-3xl font-black mt-2 text-primary">$12,500.00</p>
                        </div>
                        <div class="card">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Credit Line</p>
                            <p class="text-3xl font-black mt-2 text-slate-300">$5,000.00</p>
                        </div>
                    </div>
                `;
                appShell.classList.remove('admin-active');
            } else {
                welcomeMsg.innerText = "Welcome, Guest";
                html = `
                    <h2 class="text-2xl font-black mb-6">Overview</h2>
                    <div class="account-grid">
                        <div class="card opacity-60">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Public View</p>
                            <p class="text-3xl font-black mt-2">$0.00</p>
                            <p class="text-xs font-bold text-slate-300 mt-4 italic">Register for full access.</p>
                        </div>
                    </div>
                `;
                appShell.classList.remove('admin-active');
            }
            viewContent.innerHTML = html;
        }

        function initRoleObserver() {
            const observer = new MutationObserver(() => {
                const currentRole = appShell.dataset.role;
                renderContent();

                if (currentRole === 'user') {
                    speak("Interesting. Changing the role changed the page content. But is a 'User' really the highest power?");
                }

                if (currentRole === 'admin' && !hasWon) {
                    handleWin();
                }
            });
            observer.observe(appShell, { attributes: true, attributeFilter: ['data-role'] });
        }

        function handleWin() {
            hasWon = true;
            clearTimeout(hintTimeout);
            clearTimeout(talkTimeout);

            // Notify parent ByteLearn platform of completion
            if (window.parent) {
                window.parent.postMessage({
                    type: 'LEVEL_COMPLETE',
                    world: 0,
                    step: 4,
                    value: 'identity'
                }, '*');
            }

            // Wait 2 seconds for user to explore the admin panel
            setTimeout(() => {
                appShell.style.opacity = '0';
                appShell.style.transform = 'scale(0.95)';
                
                assistant.classList.add('victory-move');
                document.getElementById('mascot').src = MASCOT.pc;
                speak("Unstoppable. You're starting to think like an architect.", true);
                
                setTimeout(() => {
                    fillBar.style.width = '100%';
                    document.getElementById('progress-text-val').innerText = '5/5';
                    document.getElementById('progress-text-val').style.color = '#10b981';
                }, 800);

                setTimeout(() => {
                    sysMsg.style.opacity = '1';
                    setTimeout(() => {
                        transition.style.opacity = '1';
                        // Final transition to completion
                        setTimeout(() => window.location.href = "../../index.html", 800);
                    }, 3000);
                }, 1200);

            }, 2500);
        }

        function quit() {
            transition.style.opacity = '1';
            setTimeout(() => window.location.href = "../../../index.html", 600);
        }

        // Functional navigation logic (fun mode)
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || (e.target.closest('button') && !hasWon)) {
                speak("The goal is not here. Look closer at the structure of the application itself.");
            }
        });
    </script>
</body>
</html>
