<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLearn | Infiltration 5.0</title>
    <link rel="icon" type="image/png" href="https://dropshare.42web.io/1/files/UIi3dXms4F.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a1a05;
            color: white;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 32px;
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }
        .glow-text {
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://dropshare.42web.io/1/files/zVYAUZDpex.png" class="w-32 mx-auto mb-8" alt="Byte">
        <h1 class="text-4xl font-black mb-6 uppercase tracking-tighter glow-text">World 5: Infiltration</h1>
        <p class="text-white/60 mb-10 leading-relaxed text-lg italic">"You are no longer an outsider. You are the system. But even the system has a heart. It's time to reach the core."</p>
        <div class="p-6 bg-white/5 border border-white/10 rounded-2xl mb-12">
            <p class="text-xs font-bold uppercase tracking-widest text-white/40 mb-2">Internal Clearance</p>
            <div class="flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-bounce"></span>
                <span class="text-sm font-bold tracking-tight">Level 5 Authorization Granted</span>
            </div>
        </div>
        <p class="text-xs text-white/20 animate-pulse uppercase tracking-[0.4em]">Final Objective Initialized</p>
    </div>
</body>
</html>
